services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: as-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=production
    depends_on:
      - postgres
      - redis
    networks:
      - app-surveillance

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: as-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - app-surveillance

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: as-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - app-surveillance

  nginx:
    image: nginx:alpine
    container_name: as-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-surveillance

  postgres:
    image: postgres:16-alpine
    container_name: as-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_surveillance
      POSTGRES_USER: appsurv
      POSTGRES_PASSWORD: ${DB_PASSWORD:-appsurv_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    networks:
      - app-surveillance

  redis:
    image: redis:7-alpine
    container_name: as-redis
    restart: unless-stopped
    networks:
      - app-surveillance

  gp-scraper:
    build:
      context: ./docker/gp-scraper
      dockerfile: Dockerfile
    container_name: as-gp-scraper
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - app-surveillance

volumes:
  pgdata:

networks:
  app-surveillance:
    driver: bridge
